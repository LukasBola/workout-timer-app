<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Stopwatch body -->
  <circle cx="32" cy="36" r="24" stroke="#4ade80" stroke-width="4" fill="#1a1a2e"/>
  <!-- Progress arc (top-right quarter) -->
  <path d="M32 12 A24 24 0 0 1 56 36" stroke="#22c55e" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Top button / crown -->
  <rect x="28" y="4" width="8" height="10" rx="3" fill="#4ade80"/>
  <!-- Minute hand -->
  <line x1="32" y1="36" x2="32" y2="20" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="32" y1="36" x2="44" y2="28" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="36" r="3" fill="#4ade80"/>
  <!-- Tick marks -->
  <line x1="32" y1="14" x2="32" y2="18" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="58" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="36" x2="14" y2="36" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="36" x2="54" y2="36" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
</svg>
